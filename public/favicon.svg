<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle with Gradient -->
  <rect width="64" height="64" rx="16" fill="url(#grad)" />
  <!-- Book Icon -->
  <path d="M16 46C16 38 28 38 32 41C36 38 48 38 48 46V22C48 14 36 14 32 17C28 14 16 14 16 22V46Z" fill="#FFFFFF" opacity="0.95" />
  <path d="M32 17V41" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" />
  <!-- Sparkles / Stars -->
  <path d="M32 8L33.5 11L36.5 11.5L34 13.5L34.5 16.5L32 15L29.5 16.5L30 13.5L27.5 11.5L30.5 11L32 8Z" fill="#FBBF24" filter="url(#glow)" />
  <!-- A & Z letters inside book -->
  <text x="21" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="url(#grad)">A</text>
  <text x="36" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="url(#grad)">Z</text>
</svg>
